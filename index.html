<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 선택</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 사이트 입장 -->
<div id="loginContainer" class="container">

<h2>사이트 입장 확인</h2>

<div class="input-box">
<label>이름</label>

<div class="name-box">
<input type="text" id="name">
<button type="button" class="dice-btn" onclick="generateNickname()">🎲</button>
</div>

</div>



<div class="input-box">
<label>비밀번호</label>
<input type="password" id="password">
</div>

<button onclick="login()">사이트</button>
<div id="message"></div>

</div>


<!-- 선택 화면 -->
<div id="choiceContainer" style="display:none;">

<h1 class="title">콘텐츠 선택</h1>

<div class="choice-grid">

<div class="choice-card" onclick="playVideo('xrYWlhhfD4w')">
<img src="https://img.youtube.com/vi/xrYWlhhfD4w/maxresdefault.jpg">
<p>VAGA GP 영상</p>
</div>

<a href="https://youtube.com/playlist?list=PLlIOyqDV7MobDksGbeEEi5mfK-vBWuIk0" target="_blank" class="choice-card">
<img src="https://i.ytimg.com/vi/tXR4-ahomuY/maxresdefault.jpg">
<p>추천 노래</p>
</a>

<a href="https://www.racingmaster.game/kr/" target="_blank" class="choice-card">
<img src="https://i.namu.wiki/i/5d4_OK-Z1nUcK2k6PjxIcB0JF5SzFEulNYdixepqASG5kqZ-2qLmEmwndy-VyAkka9e1YRNLenoRG7-ukSD5Xw.webp">
<p>추천 게임 : 레이싱 마스터</p>
</a>

<a href="https://steamcommunity.com/profiles/76561199096852255/?action=addfriend" target="_blank" class="choice-card">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg">
<p>STEAM : Nieo</p>
</a>

<div class="choice-card">
<img src="https://daily.hankooki.com/news/photo/202206/840102_1106388_2555.jpg">
<p>Riot ID : Nieo #Корея</p>
</div>

  
<a href="https://instagram.com/dhl_vagabond.ngv" target="_blank" class="choice-card">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
<p>인스타</p>
</a>

<a href="https://youtube.com/@VAGABOND_VM_Nieo" target="_blank" class="choice-card">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
<p>유튜브 채널</p>
</a>


<div class="choice-card discord" onclick="joinDiscord()">
<img src="https://i.imgur.com/6W1sFmZ.png">
<p>NGV Discord 참여</p>
</div>

</div>
</div>


<!-- 영상 화면 -->
<div id="videoScreen" style="display:none;">

<iframe id="ytPlayer"
allow="autoplay"
allowfullscreen></iframe>

<button id="backBtn" onclick="goBack()">뒤로가기</button>

</div>

<script src="script.js"></script>

</body>
</html>
